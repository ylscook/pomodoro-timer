<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟桌面版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            color: #5a67d8;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-weight: bold;
        }

        .mode-indicator {
            display: inline-block;
            padding: 12px 24px;
            background: #e53e3e;
            color: white;
            border-radius: 25px;
            font-size: 1.1em;
            font-weight: 500;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .mode-indicator.work {
            background: #e53e3e;
        }

        .mode-indicator.shortBreak {
            background: #38a169;
        }

        .mode-indicator.longBreak {
            background: #3182ce;
        }

        .timer-display {
            font-size: 4em;
            font-weight: bold;
            color: #2d3748;
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .progress-container {
            position: relative;
            width: 250px;
            height: 250px;
            margin: 20px auto;
        }

        .progress-ring {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .progress-bg {
            fill: none;
            stroke: #e2e8f0;
            stroke-width: 12;
        }

        .progress-bar {
            fill: none;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .controls {
            margin: 30px 0;
        }

        button {
            background: #5a67d8;
            color: white;
            border: none;
            padding: 15px 30px;
            margin: 0 10px;
            border-radius: 30px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(90, 103, 216, 0.3);
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(90, 103, 216, 0.4);
        }

        button:active:not(:disabled) {
            transform: translateY(0);
        }

        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .stats {
            margin-top: 30px;
            padding: 20px;
            background: #f7fafc;
            border-radius: 15px;
        }

        .stats h3 {
            margin-bottom: 15px;
            color: #2d3748;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #5a67d8;
        }

        .stat-label {
            font-size: 0.9em;
            color: #718096;
            margin-top: 5px;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .timer-running {
            animation: pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>番茄钟</h1>

        <div class="mode-indicator work" id="modeIndicator">工作时间</div>

        <div class="progress-container">
            <svg class="progress-ring">
                <circle class="progress-bg" cx="125" cy="125" r="110"></circle>
                <circle class="progress-bar" id="progressBar" cx="125" cy="125" r="110"
                        style="stroke: #e53e3e; stroke-dasharray: 691.15; stroke-dashoffset: 691.15;"></circle>
            </svg>
            <div class="timer-display" id="timerDisplay">25:00</div>
        </div>

        <div class="controls">
            <button id="startBtn">开始</button>
            <button id="pauseBtn" disabled>暂停</button>
            <button id="resetBtn">重置</button>
            <button id="skipBtn">跳过</button>
        </div>

        <div class="stats">
            <h3>今日统计</h3>
            <div class="stats-grid">
                <div class="stat-item">
                    <div class="stat-value" id="pomodoros">0</div>
                    <div class="stat-label">番茄数</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="focusTime">0</div>
                    <div class="stat-label">专注分钟</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="breaks">0</div>
                    <div class="stat-label">休息次数</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        class DesktopTimer {
            constructor() {
                this.workMinutes = 25;
                this.shortBreakMinutes = 5;
                this.longBreakMinutes = 15;
                this.longBreakInterval = 4;

                this.currentMode = 'work';
                this.isRunning = false;
                this.timeLeft = this.workMinutes * 60;
                this.pomodoros = 0;
                this.focusTime = 0;
                this.breaks = 0;

                this.initializeElements();
                this.initializeEventListeners();
                this.loadSettings();
                this.updateDisplay();
            }

            initializeElements() {
                this.timerDisplay = document.getElementById('timerDisplay');
                this.modeIndicator = document.getElementById('modeIndicator');
                this.progressBar = document.getElementById('progressBar');
                this.startBtn = document.getElementById('startBtn');
                this.pauseBtn = document.getElementById('pauseBtn');
                this.resetBtn = document.getElementById('resetBtn');
                this.skipBtn = document.getElementById('skipBtn');
                this.pomodorosDisplay = document.getElementById('pomodoros');
                this.focusTimeDisplay = document.getElementById('focusTime');
                this.breaksDisplay = document.getElementById('breaks');
            }

            initializeEventListeners() {
                this.startBtn.addEventListener('click', () => this.start());
                this.pauseBtn.addEventListener('click', () => this.pause());
                this.resetBtn.addEventListener('click', () => this.reset());
                this.skipBtn.addEventListener('click', () => this.skip());

                // 监听 IPC 消息
                ipcRenderer.on('start-timer', () => this.start());
                ipcRenderer.on('pause-timer', () => this.pause());
                ipcRenderer.on('reset-timer', () => this.reset());
            }

            loadSettings() {
                // 从本地存储加载设置
                const settings = localStorage.getItem('pomodoroSettings');
                if (settings) {
                    const parsed = JSON.parse(settings);
                    this.workMinutes = parsed.workMinutes || 25;
                    this.shortBreakMinutes = parsed.shortBreakMinutes || 5;
                    this.longBreakMinutes = parsed.longBreakMinutes || 15;
                    this.longBreakInterval = parsed.longBreakInterval || 4;
                }

                // 加载统计数据
                const stats = localStorage.getItem('pomodoroStats');
                if (stats) {
                    const today = new Date().toDateString();
                    const allStats = JSON.parse(stats);
                    const todayStats = allStats[today];
                    if (todayStats) {
                        this.pomodoros = todayStats.pomodoros || 0;
                        this.focusTime = todayStats.focusTime || 0;
                        this.breaks = todayStats.breaks || 0;
                    }
                }
            }

            saveStats() {
                const today = new Date().toDateString();
                const stats = localStorage.getItem('pomodoroStats') || '{}';
                const allStats = JSON.parse(stats);

                if (!allStats[today]) {
                    allStats[today] = {
                        pomodoros: 0,
                        focusTime: 0,
                        breaks: 0
                    };
                }

                allStats[today].pomodoros = this.pomodoros;
                allStats[today].focusTime = this.focusTime;
                allStats[today].breaks = this.breaks;

                localStorage.setItem('pomodoroStats', JSON.stringify(allStats));
            }

            start() {
                this.isRunning = true;
                this.startBtn.disabled = true;
                this.pauseBtn.disabled = false;
                this.timerDisplay.classList.add('timer-running');

                ipcRenderer.send('update-tray-tooltip', '运行中');

                this.tick();
            }

            pause() {
                this.isRunning = false;
                this.startBtn.disabled = false;
                this.pauseBtn.disabled = true;
                this.timerDisplay.classList.remove('timer-running');

                ipcRenderer.send('update-tray-tooltip', '已暂停');

                if (this.interval) {
                    clearInterval(this.interval);
                }
            }

            reset() {
                this.pause();
                this.currentMode = 'work';
                this.timeLeft = this.workMinutes * 60;
                this.updateDisplay();
                ipcRenderer.send('update-tray-tooltip', '就绪');
            }

            skip() {
                this.pause();
                this.switchMode();
            }

            switchMode() {
                if (this.currentMode === 'work') {
                    this.pomodoros++;
                    this.focusTime += this.workMinutes;

                    if (this.pomodoros % this.longBreakInterval === 0) {
                        this.currentMode = 'longBreak';
                        this.timeLeft = this.longBreakMinutes * 60;
                        this.breaks++;
                    } else {
                        this.currentMode = 'shortBreak';
                        this.timeLeft = this.shortBreakMinutes * 60;
                        this.breaks++;
                    }
                } else {
                    this.currentMode = 'work';
                    this.timeLeft = this.workMinutes * 60;
                }

                this.saveStats();
                this.updateStats();
                this.updateDisplay();
            }

            tick() {
                this.interval = setInterval(() => {
                    if (this.timeLeft > 0) {
                        this.timeLeft--;
                        this.updateDisplay();
                    } else {
                        this.timerComplete();
                    }
                }, 1000);
            }

            timerComplete() {
                this.pause();
                this.playNotificationSound();

                // 通知用户
                if (this.currentMode === 'work') {
                    // 使用系统通知
                    if (window.Notification && Notification.permission === 'granted') {
                        new Notification('番茄钟', {
                            body: '工作时间结束！休息一下吧',
                            icon: 'path/to/icon.png'
                        });
                    }
                } else {
                    if (window.Notification && Notification.permission === 'granted') {
                        new Notification('番茄钟', {
                            body: '休息结束！继续工作吧',
                            icon: 'path/to/icon.png'
                        });
                    }
                }

                // 自动切换模式
                setTimeout(() => {
                    this.switchMode();
                }, 3000);
            }

            updateDisplay() {
                const minutes = Math.floor(this.timeLeft / 60);
                const seconds = this.timeLeft % 60;
                this.timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;

                // 更新模式指示器
                this.modeIndicator.className = 'mode-indicator';
                if (this.currentMode === 'work') {
                    this.modeIndicator.textContent = '工作时间';
                    this.modeIndicator.classList.add('work');
                } else if (this.currentMode === 'shortBreak') {
                    this.modeIndicator.textContent = '短休息';
                    this.modeIndicator.classList.add('shortBreak');
                } else if (this.currentMode === 'longBreak') {
                    this.modeIndicator.textContent = '长休息';
                    this.modeIndicator.classList.add('longBreak');
                }

                // 更新进度条
                this.updateProgress();
            }

            updateProgress() {
                let totalTime;
                let color;

                if (this.currentMode === 'work') {
                    totalTime = this.workMinutes * 60;
                    color = '#e53e3e';
                } else if (this.currentMode === 'shortBreak') {
                    totalTime = this.shortBreakMinutes * 60;
                    color = '#38a169';
                } else {
                    totalTime = this.longBreakMinutes * 60;
                    color = '#3182ce';
                }

                const progress = (totalTime - this.timeLeft) / totalTime;
                const circumference = 2 * Math.PI * 110;
                const offset = circumference - (progress * circumference);

                this.progressBar.style.strokeDashoffset = offset;
                this.progressBar.style.stroke = color;
            }

            updateStats() {
                this.pomodorosDisplay.textContent = this.pomodoros;
                this.focusTimeDisplay.textContent = this.focusTime;
                this.breaksDisplay.textContent = this.breaks;
            }

            playNotificationSound() {
                // 使用系统声音
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2/LDciUFLIHO8tiJNwgZaLvt559NEAxQp+PwtmMcBjiR1/LMeSwFJHfH8N2QQAoUXrTp66hVFApGn+DyvmwhBSuBzvLZiTYIG2m98OScTgwOUanm7blmFgU7k9n1unEiBC13yO/eizEIHWq+8+OWT');
                audio.play();
            }
        }

        // 请求通知权限
        if (window.Notification) {
            Notification.requestPermission();
        }

        // 初始化应用
        const timer = new DesktopTimer();
    </script>
</body>
</html>
